@if (!userProfile()) {
    <div class="login-section">
        <p class="host-text">Um eine Session zu hosten, melde dich bitte zuerst an.</p>

        <button class="join-btn" style="width: 100%;" (click)="onLogin()">
            MIT SPOTIFY ANMELDEN
        </button>
    </div>
}

@else {
    <div class="host-section">
        <div class="user-badge">
            <span class="badge-label">Angemeldet als</span>
            <span class="user-name">{{ userProfile()?.display_name }}</span>
            <span class="user-email">{{ userProfile()?.email }}</span>
        </div>

        <div class="input-group">
            <input
                    class="host-input"
                    type="text"
                    placeholder="Titel der Session"
                    [(ngModel)]="title">
            <button
                    class="start-btn"
                    (click)="addSession()"
                    [disabled]="!title().trim()">
                STARTEN
            </button>
        </div>

        <button class="logout-btn" (click)="onLogout()">Abmelden</button>
    </div>
}
