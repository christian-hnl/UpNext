

<h1>Private Party</h1>

<div class="mode1-container">
    <div class="join-section">
        <h3>Einer Session beitreten</h3>
        <input [(ngModel)]="userName" placeholder="Dein Name" required>
        <br>
        <input [(ngModel)]="sessionId" placeholder="Session-ID">
        <button (click)="checkSession(sessionId())" [disabled]="!userName().trim() || !sessionId()">Beitreten</button>
    </div>

    <hr>

    <div class="host-section">
        <app-host></app-host>
    </div>
</div>
