<section class="page page--narrow">
    <header class="mode1-header">
        <h1>Private Party</h1>
        <p class="muted">Tritt einer privaten Session bei oder hoste deine eigene.</p>
    </header>

    <div class="join-card">
        <p class="section-title">Session beitreten</p>
        <div class="join-fields">
            <input [(ngModel)]="userName" placeholder="Dein Name">
            <input [(ngModel)]="sessionId" placeholder="Session-ID" type="number">
            <button (click)="checkSession()">Beitreten</button>
        </div>
    </div>

    <app-host></app-host>
</section>
