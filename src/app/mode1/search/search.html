<div class="search-container">
  <input type="text" [formControl]="searchControl" placeholder="Search for a song..." class="search-input"/>
  <div class="search-results">
    @for (track of searchResults(); track track.id) {
      <div class="search-result-item">
        <img [src]="track.album.images[0].url" alt="Album cover for {{track.name}}" class="album-art"/>
        <div class="track-info">
          <div class="track-name">{{ track.name }}</div>
          <div class="artist-name">{{ track.artists[0].name }}</div>
        </div>
      </div>
    }
  </div>
</div>
