<div class="search-container">
    <div class="input-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10.533 1.27893C5.35215 1.27893 1.12598 5.41887 1.12598 10.5579C1.12598 15.697 5.35215 19.8369 10.533 19.8369C12.767 19.8369 14.8235 19.0671 16.4402 17.7794L20.7929 22.132C21.1834 22.5226 21.8166 22.5226 22.2071 22.132C22.5976 21.7415 22.5976 21.1083 22.2071 20.7178L17.8634 16.3741C19.1616 14.7849 19.94 12.7634 19.94 10.5579C19.94 5.41887 15.7138 1.27893 10.533 1.27893ZM3.12598 10.5579C3.12598 6.55226 6.42768 3.27893 10.533 3.27893C14.6383 3.27893 17.94 6.55226 17.94 10.5579C17.94 14.5636 14.6383 17.8369 10.533 17.8369C6.42768 17.8369 3.12598 14.5636 3.12598 10.5579Z"></path>
        </svg>
        <input type="text" [formControl]="searchControl" placeholder="Was möchtest du hören?">
    </div>

    <ul class="search-results">
        @for (song of searchTracks; track song.id) {
            <li class="track-row">

                <img class="track-image" [src]="song.album?.images?.[2]?.url || 'assets/placeholder.png'" alt="">

                <div class="track-info">
                    <span class="track-name">{{ song.name }}</span>
                    <span class="track-artist">{{ song.artists?.[0]?.name || 'Unbekannter Künstler' }}</span>
                </div>

                <div class="track-votes">
                    <button class="vote-btn" aria-label="Upvote">
                        <svg viewBox="0 0 24 24"><path d="M4 14l8-8 8 8H4z"></path></svg>
                    </button>
                    <span class="vote-count">0</span>
                    <button class="vote-btn" aria-label="Downvote">
                        <svg viewBox="0 0 24 24"><path d="M20 10l-8 8-8-8h16z"></path></svg>
                    </button>
                </div>

                <span class="track-duration">{{ formatDuration(song.duration_ms) }}</span>
            </li>
        } @empty {
            @if (searchControl.value) {
                <li class="no-results">Keine Songs gefunden</li>
            }
        }
    </ul>
</div>
