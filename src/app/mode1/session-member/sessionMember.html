


<h1>{{ title() }}</h1>
<p>Session ID: {{ sessionId() }}</p>
<p>Hallo {{ userName() }}!</p>

<div class="session-info">
    <p>Host: <strong>{{ hostName() }}</strong></p>
    <p>Andere Teilnehmer: 
        @for (member of otherMembers(); track $index) {
            <span>{{ member }}{{ !$last ? ', ' : '' }}</span>
        } @empty {
            <span>Nur du</span>
        }
    </p>
</div>

<app-queuevoting [sessionId]="sessionId()"></app-queuevoting>

<app-search [sessionId]="sessionId()"></app-search>
