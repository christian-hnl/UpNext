<div class="toast-stack" role="status" aria-live="polite">
  @for (t of toasts(); track t.id) {
    <button
      type="button"
      class="toast"
      [class.error]="t.kind === 'error'"
      [class.success]="t.kind === 'success'"
      [class.info]="t.kind === 'info'"
      (click)="dismiss(t.id)">
      <span class="toast-text">{{ t.text }}</span>
    </button>
  }
</div>
