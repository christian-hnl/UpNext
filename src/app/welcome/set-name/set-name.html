<header class="header-container">
    <img src="logo_no-text.ico" alt="Logo" class="logo" />
    <h1 class="title">upNext</h1>
</header>

<div class="subtitle-container">
    <p>GEMEINSAM MUSIK HÖREN</p>
</div>

<div class="session-join-container">
    <div class="input-row">
        <input class="session-input" [(ngModel)]="userName" placeholder="Enter Name" type="text">
        <button class="join-btn" (click)="createUserAndJoinSession()">JOIN</button>
    </div>

    @if (errorMess()) {
        <p class="error-message">{{ errorMess() }}</p>
    }
</div>
